<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker v4 - Multi-Round</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary: #4caf50;
            --accent: #2196f3;
            --danger: #f44336;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            user-select: none;
        }
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .nav-arrow {
            padding: 5px 15px;
            font-size: 20px;
            background: #333;
        }
        h2 { margin: 0; font-weight: 400; }
        .gps-status {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-bottom: 15px;
        }
        .gps-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: grey;
            margin-right: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 15px 5px;
            font-size: 16px;
            font-weight: bold;
            touch-action: manipulation;
            transition: background 0.1s;
        }
        button:active, button.selected {
            background-color: var(--primary);
            border-color: #fff;
        }
        button.blue-selected {
            background-color: var(--accent);
            border-color: #fff;
        }
        .wide-btn { grid-column: span 2; }
        .action-btn {
            grid-column: span 4;
            background-color: var(--primary);
            color: white;
            padding: 20px;
            font-size: 18px;
            margin-top: 10px;
        }
        .danger-btn { background-color: var(--danger); }
        .section {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid #2d2d2d;
        }
        .section-title { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 8px; font-weight: bold;}
        .course-input {
            width: 90%;
            background: #2b2b2b;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        #log { font-family: monospace; font-size: 11px; max-height: 120px; overflow-y: auto; white-space: pre-wrap; }
        .hidden { display: none !important; }
        .counter { font-size: 24px; text-align: center; margin: 10px 0; font-weight: bold;}
        
        /* Historik-lista */
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #252525;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 13px;
        }
        .history-item button {
            padding: 5px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <input type="text" id="course-name" class="course-input" placeholder="Skriv in golfbana...">
    </div>

    <div class="header-nav">
        <button class="nav-arrow" onclick="changeHole(-1)">◀</button>
        <h2>Hål <span id="hole-number">1</span></h2>
        <button class="nav-arrow" onclick="changeHole(1)">▶</button>
    </div>
    
    <div class="gps-status">
        <span id="gps-dot" class="gps-dot"></span> GPS Noggrannhet: <span id="gps-accuracy">Okänd</span>
    </div>

    <div id="shot-creation-section" class="section">
        <div class="section-title">1. Vad slog du precis?</div>
        <div class="grid" id="club-grid">
            <button onclick="selectClub('D')">D</button>
            <button onclick="selectClub('3W')">3W</button>
            <button onclick="selectClub('4H')">4H</button>
            <button onclick="selectClub('5i')">5i</button>
            <button onclick="selectClub('6i')">6i</button>
            <button onclick="selectClub('7i')">7i</button>
            <button onclick="selectClub('8i')">8i</button>
            <button onclick="selectClub('9i')">9i</button>
            <button onclick="selectClub('PW')">PW</button>
            <button onclick="selectClub('GW')">GW</button>
            <button onclick="selectClub('SW')">SW</button>
            <button onclick="selectClub('LW')">LW</button>
            <button class="wide-btn" style="background-color: #2e7d32;" onclick="switchToPuttMode()">⛳ GREEN / PUTT</button>
        </div>

        <div class="section-title">2. Hur var träffen?</div>
        <div class="grid" id="quality-grid">
            <button onclick="selectQuality('🔥 Bra')">🔥 Bra</button>
            <button onclick="selectQuality('💩 Tunn')">💩 Tunn</button>
            <button onclick="selectQuality('↪️ Slice')">↪️ Slice</button>
            <button onclick="selectQuality('↩️ Hook')">↩️ Hook</button>
        </div>
        
        <div class="grid">
            <button id="main-action-btn" class="action-btn" onclick="registerShotStart()">🏌️‍♂️ REGISTRERA SLAG HÄR</button>
        </div>
    </div>

    <div id="shot-landing-section" class="section hidden" style="border-color: var(--accent);">
        <div class="section-title" style="color: var(--accent);">3. Framme vid bollen: Var landade den?</div>
        <div class="grid" id="result-grid">
            <button class="wide-btn" onclick="selectResult('Fairway')">⛳ Fairway</button>
            <button class="wide-btn" onclick="selectResult('Rough Vänster')">🌲 Vänster</button>
            <button class="wide-btn" onclick="selectResult('Rough Höger')">🌲 Höger</button>
            <button class="wide-btn" onclick="selectResult('Bunker')">🏖️ Bunker</button>
            <button class="wide-btn" onclick="selectResult('Plikt/Drop')">💧 Plikt</button>
        </div>
        <div class="grid">
            <button class="action-btn" style="background-color: var(--accent);" onclick="registerShotLanding()">📍 LOGGA LANDNING & NÄSTA</button>
        </div>
    </div>

    <div id="putt-section" class="section hidden">
        <div class="section-title">Puttning</div>
        <div class="counter">
            <button onclick="adjustPutts(-1)">-</button>
            <span id="putt-count" style="margin: 0 20px;">2</span>
            <button onclick="adjustPutts(1)">+</button>
        </div>
        <div class="section-title">Längd förstaputt</div>
        <div class="grid" id="puttdist-grid">
            <button onclick="selectPuttDist('<2m')">&lt;2m</button>
            <button onclick="selectPuttDist('2-4m')">2-4m</button>
            <button onclick="selectPuttDist('5-8m')">5-8m</button>
            <button onclick="selectPuttDist('8m+')">8m+</button>
        </div>
        <div class="grid">
            <button class="action-btn" style="background-color: #1565c0;" onclick="endHole()">🏁 AVSLUTA HÅL</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Aktuell runda (Hittills)</div>
        <div id="log">Inga slag sparade än.</div>
        <button class="action-btn" style="background-color: #1565c0; width:100%; font-size:16px; padding:12px; margin-bottom:10px;" onclick="archiveCurrentRound()">💾 SPARA OCH AVSLUTA RUNDAN</button>
        <button class="wide-btn danger-btn" style="width:100%; font-size:12px; padding:6px;" onclick="clearCurrentShots()">Kassera aktuella slag</button>
    </div>

    <div class="section">
        <div class="section-title">Sparade rundor i telefonen</div>
        <div id="history-list">Inga sparade rundor än.</div>
    </div>

    <script>
        let currentHole = 1;
        let shots = JSON.parse(localStorage.getItem('golf_current_shots')) || [];
        let archivedRounds = JSON.parse(localStorage.getItem('golf_archived_rounds')) || [];
        
        document.getElementById('course-name').value = localStorage.getItem('golf_course_name') || "";
        document.getElementById('course-name').addEventListener('input', (e) => {
            localStorage.setItem('golf_course_name', e.target.value);
        });

        let currentSelection = { club: null, quality: null, result: null, putts: 2, puttDist: null };
        let lastKnownAccuracy = 0;

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                lastKnownAccuracy = Math.round(pos.coords.accuracy);
                document.getElementById('gps-accuracy').textContent = `+/- ${lastKnownAccuracy}m`;
                const dot = document.getElementById('gps-dot');
                if(lastKnownAccuracy <= 6) dot.style.backgroundColor = '#4caf50';
                else if(lastKnownAccuracy <= 12) dot.style.backgroundColor = '#ffeb3b';
                else dot.style.backgroundColor = '#f44336';
            }, () => {}, { enableHighAccuracy: true });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const phi1 = lat1 * Math.PI/180;
            const phi2 = lat2 * Math.PI/180;
            const deltaPhi = (lat2-lat1) * Math.PI/180;
            const deltaLambda = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
            return Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))));
        }

        function changeHole(val) {
            currentHole = Math.max(1, currentHole + val);
            document.getElementById('hole-number').textContent = currentHole;
            updateLog();
        }

        function selectClub(club) {
            document.querySelectorAll('#club-grid button').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
            currentSelection.club = club;
        }

        function selectQuality(q) {
            document.querySelectorAll('#quality-grid button').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
            currentSelection.quality = q;
        }

        function selectResult(res) {
            document.querySelectorAll('#result-grid button').forEach(b => b.classList.remove('blue-selected'));
            event.target.classList.add('blue-selected');
            currentSelection.result = res;
        }

        function selectPuttDist(dist) {
            document.querySelectorAll('#puttdist-grid button').forEach(b => b.classList.remove('selected'));
            event.target.classList.add('selected');
            currentSelection.puttDist = dist;
        }

        function adjustPutts(val) {
            currentSelection.putts = Math.max(0, currentSelection.putts + val);
            document.getElementById('putt-count').textContent = currentSelection.putts;
        }

        function registerShotStart() {
            if (!currentSelection.club || !currentSelection.quality) { alert('Välj både klubba och träffkvalitet!'); return; }

            navigator.geolocation.getCurrentPosition((position) => {
                const shotData = {
                    course: document.getElementById('course-name').value || 'Okänd bana',
                    hole: currentHole,
                    shotNum: shots.filter(s => s.hole === currentHole).length + 1,
                    club: currentSelection.club,
                    quality: currentSelection.quality,
                    startLat: position.coords.latitude,
                    startLon: position.coords.longitude,
                    startAcc: Math.round(position.coords.accuracy),
                    endLat: null,
                    endLon: null,
                    endAcc: null,
                    calculatedDistance: 0,
                    result: null
                };

                shots.push(shotData);
                localStorage.setItem('golf_current_shots', JSON.stringify(shots));
                
                document.getElementById('shot-creation-section').classList.add('hidden');
                document.getElementById('shot-landing-section').classList.remove('hidden');
                updateLog();
            }, () => { alert('GPS-fel.'); }, { enableHighAccuracy: true, timeout: 5000 });
        }

        function registerShotLanding() {
            if (!currentSelection.result) { alert('Välj var bollen landade!'); return; }

            navigator.geolocation.getCurrentPosition((position) => {
                let holeShots = shots.filter(s => s.hole === currentHole);
                let currentShot = holeShots[holeShots.length - 1];
                
                currentShot.endLat = position.coords.latitude;
                currentShot.endLon = position.coords.longitude;
                currentShot.endAcc = Math.round(position.coords.accuracy);
                currentShot.result = currentSelection.result;
                currentShot.calculatedDistance = getDistance(currentShot.startLat, currentShot.startLon, currentShot.endLat, currentShot.endLon);
                
                localStorage.setItem('golf_current_shots', JSON.stringify(shots));
                
                document.getElementById('shot-landing-section').classList.add('hidden');
                document.getElementById('shot-creation-section').classList.remove('hidden');
                
                currentSelection.club = null; currentSelection.quality = null; currentSelection.result = null;
                document.querySelectorAll('button').forEach(b => b.classList.remove('selected', 'blue-selected'));
                updateLog();
            }, () => { alert('GPS-fel.'); }, { enableHighAccuracy: true, timeout: 5000 });
        }

        function switchToPuttMode() {
            document.getElementById('shot-creation-section').classList.add('hidden');
            document.getElementById('shot-landing-section').classList.add('hidden');
            document.getElementById('putt-section').classList.remove('hidden');
        }

        function endHole() {
            let holeShots = shots.filter(s => s.hole === currentHole);
            navigator.geolocation.getCurrentPosition((position) => {
                if (holeShots.length > 0) {
                    let lastShot = holeShots[holeShots.length - 1];
                    if (!lastShot.endLat) {
                        lastShot.endLat = position.coords.latitude;
                        lastShot.endLon = position.coords.longitude;
                        lastShot.endAcc = Math.round(position.coords.accuracy);
                        lastShot.result = 'Green';
                        lastShot.calculatedDistance = getDistance(lastShot.startLat, lastShot.startLon, lastShot.endLat, lastShot.endLon);
                    }
                    lastShot.putts = currentSelection.putts;
                    lastShot.puttDist = currentSelection.puttDist || 'Ej angivet';
                }
                
                localStorage.setItem('golf_current_shots', JSON.stringify(shots));
                changeHole(1);
                
                document.getElementById('shot-creation-section').classList.remove('hidden');
                document.getElementById('putt-section').classList.add('hidden');
                
                currentSelection = { club: null, quality: null, result: null, putts: 2, puttDist: null };
                document.getElementById('putt-count').textContent = 2;
                document.querySelectorAll('button').forEach(b => b.classList.remove('selected', 'blue-selected'));
                updateLog();
            }, () => { alert('GPS-fel.'); }, { enableHighAccuracy: true, timeout: 5000 });
        }

        function updateLog() {
            const logDiv = document.getElementById('log');
            if (shots.length === 0) { logDiv.textContent = "Inga slag sparade på aktuellt hål."; return; }
            
            let html = "";
            let currentHoleShots = shots.filter(s => s.hole === currentHole);
            if(currentHoleShots.length === 0) { logDiv.textContent = "Inga slag sparade på detta hål än."; return;}
            
            currentHoleShots.forEach(s => {
                html += `Slag #${s.shotNum}: ${s.club} (${s.quality})`;
                if(s.calculatedDistance > 0) html += ` -> ${s.calculatedDistance}m (±${s.startAcc + s.endAcc}m)`;
                if(s.result) html += ` [Landa: ${s.result}]`;
                if(s.putts !== undefined) html += ` (${s.putts} puttar)`;
                html += `\n`;
            });
            logDiv.textContent = html;
        }

        // NY FUNKTION: Arkivera den pågående rundan till historiken
        function archiveCurrentRound() {
            if (shots.length === 0) { alert("Det finns inga slag att spara i en runda."); return; }
            
            let course = document.getElementById('course-name').value || 'Okänd bana';
            if (confirm(`Vill du slutföra och arkivera rundan på "${course}"?`)) {
                let newRound = {
                    id: Date.now(),
                    date: new Date().toISOString().slice(0,10),
                    course: course,
                    data: shots
                };
                
                archivedRounds.push(newRound);
                localStorage.setItem('golf_archived_rounds', JSON.stringify(archivedRounds));
                
                // Rensa pågående runda
                shots = [];
                localStorage.removeItem('golf_current_shots');
                currentHole = 1;
                document.getElementById('hole-number').textContent = currentHole;
                document.getElementById('course-name').value = "";
                localStorage.removeItem('golf_course_name');
                
                // Återställ menyer
                document.getElementById('shot-creation-section').classList.remove('hidden');
                document.getElementById('shot-landing-section').classList.add('hidden');
                document.getElementById('putt-section').classList.add('hidden');
                
                updateLog();
                updateHistoryList();
            }
        }

        function clearCurrentShots() {
            if(confirm("Vill du radera alla inslagna slag i den pågående rundan? (Detta rör INTE din historik)")) {
                shots = [];
                localStorage.removeItem('golf_current_shots');
                currentHole = 1;
                document.getElementById('hole-number').textContent = currentHole;
                updateLog();
            }
        }

        // Rendera listan med gamla rundor
        function updateHistoryList() {
            const histDiv = document.getElementById('history-list');
            if (archivedRounds.length === 0) { histDiv.textContent = "Inga sparade rundor än."; return; }
            
            histDiv.innerHTML = "";
            // Visa senaste rundan överst
            [...archivedRounds].reverse().forEach(round =>
