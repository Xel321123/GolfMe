<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker v4.4 - Complete Edition</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary: #4caf50;
            --accent: #2196f3;
            --danger: #f44336;
            --warning: #ff9800;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            user-select: none;
        }
        .setup-section {
            text-align: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #2d2d2d;
        }
        .course-input {
            width: 90%;
            background: #2b2b2b;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 15px;
            text-align: center;
        }
        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }
        .nav-arrow {
            padding: 8px 20px;
            font-size: 20px;
            background: #333;
            min-width: 60px;
        }
        h2 { margin: 0; font-weight: bold; font-size: 24px; }
        .gps-status {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }
        .gps-dot {
            display: inline-block;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: grey;
            margin-right: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        button {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 12px 2px;
            font-size: 15px;
            font-weight: bold;
            touch-action: manipulation;
        }
        button.selected {
            background-color: var(--primary) !important;
            border-color: #fff !important;
        }
        button.blue-selected {
            background-color: var(--accent) !important;
            border-color: #fff !important;
        }
        button.orange-selected {
            background-color: var(--warning) !important;
            border-color: #fff !important;
        }
        .wide-btn { grid-column: span 2; }
        .action-btn {
            grid-column: span 4;
            background-color: var(--primary);
            color: white;
            padding: 16px;
            font-size: 18px;
            margin-top: 5px;
        }
        .danger-btn { background-color: var(--danger); }
        .section {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid #2d2d2d;
        }
        .section-title { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 6px; font-weight: bold;}
        #log { font-family: monospace; font-size: 11px; max-height: 125px; overflow-y: auto; white-space: pre-wrap; background: #151515; padding: 5px; border-radius: 8px; margin-bottom: 8px; }
        .hidden { display: none !important; }
        .counter { font-size: 24px; text-align: center; margin: 10px 0; font-weight: bold;}
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #252525;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 13px;
        }
        .history-item button { padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

    <!-- GOLFBANA -->
    <div class="setup-section">
        <input type="text" id="course-name" class="course-input" placeholder="Ange bana...">
    </div>

    <!-- HUVUDNAVIGERING HÅL -->
    <div class="header-nav">
        <button class="nav-arrow" onclick="changeHole(-1)">◀</button>
        <h2>Hål <span id="hole-number">1</span></h2>
        <button class="nav-arrow" onclick="changeHole(1)">▶</button>
    </div>
    
    <!-- GPS STATUS -->
    <div class="gps-status">
        <span id="gps-dot" class="gps-dot"></span> GPS: <span id="gps-accuracy">Söker...</span>
    </div>

    <!-- VÄLJ PAR FÖR HÅLET -->
    <div class="section" id="par-section">
        <div class="section-title">Välj hålets par</div>
        <div class="grid" id="par-grid" style="grid-template-columns: repeat(3, 1fr);">
            <button onclick="selectPar(this, 3)">Par 3</button>
            <button onclick="selectPar(this, 4)">Par 4</button>
            <button onclick="selectPar(this, 5)">Par 5</button>
        </div>
    </div>

    <!-- STEG 1: LOGGA DET SLAG DU PRECIS SLOG -->
    <div id="shot-creation-section" class="section">
        <div class="section-title">1. Vad slog du precis?</div>
        <div class="grid" id="club-grid">
            <button onclick="selectClub(this, 'D')">D</button>
            <button onclick="selectClub(this, '3W')">3W</button>
            <button onclick="selectClub(this, '4H')">4H</button>
            <button onclick="selectClub(this, '5i')">5i</button>
            <button onclick="selectClub(this, '6i')">6i</button>
            <button onclick="selectClub(this, '7i')">7i</button>
            <button onclick="selectClub(this, '8i')">8i</button>
            <button onclick="selectClub(this, '9i')">9i</button>
            <button onclick="selectClub(this, 'PW')">PW</button>
            <button onclick="selectClub(this, 'GW')">GW</button>
            <button onclick="selectClub(this, 'SW')">SW</button>
            <button onclick="selectClub(this, 'LW')">LW</button>
            <button class="wide-btn" style="background-color: #2e7d32;" onclick="switchToPuttMode()">⛳ GREEN / PUTT</button>
        </div>

        <div class="section-title">2. Hur var träffen?</div>
        <div class="grid" id="quality-grid">
            <button onclick="selectQuality(this, '🔥 Bra')">🔥 Bra</button>
            <button onclick="selectQuality(this, '💩 Tunn')">💩 Tunn</button>
            <button onclick="selectQuality(this, '↪️ Slice')">↪️ Slice</button>
            <button onclick="selectQuality(this, '↩️ Hook')">↩️ Hook</button>
        </div>
        
        <div class="grid">
            <button id="main-action-btn" class="action-btn" onclick="registerShotStart()">🏌️‍♂️ REGISTRERA SLAG HÄR</button>
        </div>
    </div>

    <!-- STEG 2: BOLLENS LANDNINGSLÄGE -->
    <div id="shot-landing-section" class="section hidden" style="border-color: var(--accent);">
        <div class="section-title" style="color: var(--accent);">3. Framme vid bollen: Var landade den?</div>
        <div class="grid" id="result-grid">
            <button class="wide-btn" onclick="selectResult(this, 'Fairway')">⛳ Fairway</button>
            <button class="wide-btn" onclick="selectResult(this, 'Green')">🟢 Green</button>
            <button class="wide-btn" onclick="selectResult(this, 'Rough Vänster')">🌲 Vänster</button>
            <button class="wide-btn" onclick="selectResult(this, 'Rough Höger')">🌲 Höger</button>
            <button class="wide-btn" onclick="selectResult(this, 'Bunker')">🏖️ Bunker</button>
            <button class="wide-btn" onclick="selectResult(this, 'Plikt/Drop')">💧 Plikt</button>
        </div>
        <div class="grid">
            <button class="action-btn" style="background-color: var(--accent);" onclick="registerShotLanding()">📍 LOGGA LANDNING & NÄSTA</button>
        </div>
    </div>

    <!-- GREEN / PUTTNING -->
    <div id="putt-section" class="section hidden">
        <div class="section-title">Puttning</div>
        <div class="counter">
            <button onclick="adjustPutts(-1)">-</button>
            <span id="putt-count" style="margin: 0 20px;">2</span>
            <button onclick="adjustPutts(1)">+</button>
        </div>
        <div class="section-title">Längd förstaputt</div>
        <div class="grid" id="puttdist-grid">
            <button onclick="selectPuttDist(this, '<2m')">&lt;2m</button>
            <button onclick="selectPuttDist(this, '2-4m')">2-4m</button>
            <button onclick="selectPuttDist(this, '5-8m')">5-8m</button>
            <button onclick="selectPuttDist(this, '8m+')">8m+</button>
        </div>
        <div class="grid">
            <button class="action-btn" style="background-color: #1565c0;" onclick="endHole()">🏁 AVSLUTA HÅL</button>
        </div>
    </div>

    <!-- MONITOR / AKTUELL LOGG -->
    <div class="section">
        <div class="section-title">Aktuell runda</div>
        <div id="log">Inga slag sparade på aktuellt hål.</div>
        
        <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 8px;">
            <button style="background-color: #555; font-size: 13px; padding: 10px;" onclick="undoLastShot()">↩️ Ångra senaste slag</button>
            <button class="danger-btn" style="font-size: 13px; padding: 10px;" onclick="clearCurrentShots()">🗑️ Rensa pågående runda</button>
        </div>
        
        <button class="action-btn" style="background-color: #1565c0; width:100%; font-size:15px; padding:12px; margin-top:10px;" onclick="archiveCurrentRound()">💾 SPARA OCH AVSLUTA RUNDAN</button>
    </div>

    <!-- HISTORIKEN -->
    <div class="section">
        <div class="section-title">Sparade rundor i telefonen</div>
        <div id="history-list">Inga sparade rundor än.</div>
    </div>

    <script>
        let currentHole = 1;
        let shots = JSON.parse(localStorage.getItem('golf_current_shots')) || [];
        let archivedRounds = JSON.parse(localStorage.getItem('golf_archived_rounds')) || [];
        let holePars = JSON.parse(localStorage.getItem('golf_current_pars')) || {};
        
        document.getElementById('course-name').value = localStorage.getItem('golf_course_name') || "";
        document.getElementById('course-name').addEventListener('input', (e) => {
            localStorage.setItem('golf_course_name', e.target.value);
        });

        let currentSelection = { club: null, quality: null, result: null, putts: 2, puttDist: null };
        let lastKnownAccuracy = 0;

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                lastKnownAccuracy = Math.round(pos.coords.accuracy);
                document.getElementById('gps-accuracy').textContent = `±${lastKnownAccuracy}m`;
                const dot = document.getElementById('gps-dot');
                if(lastKnownAccuracy <= 6) dot.style.backgroundColor = '#4caf50';
                else if(lastKnownAccuracy <= 12) dot.style.backgroundColor = '#ffeb3b';
                else dot.style.backgroundColor = '#f44336';
            }, () => {}, { enableHighAccuracy: true });
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const phi1 = lat1 * Math.PI/180;
            const phi2 = lat2 * Math.PI/180;
            const deltaPhi = (lat2-lat1) * Math.PI/180;
            const deltaLambda = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
            return Math.round(R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))));
        }

        function changeHole(val) {
            currentHole = Math.max(1, currentHole + val);
            document.getElementById('hole-number').textContent = currentHole;
            updateParUI();
            updateLog();
        }

        function selectPar(element, parValue) {
            document.querySelectorAll('#par-grid button').forEach(b => b.classList.remove('orange-selected'));
            element.classList.add('orange-selected');
            holePars[currentHole] = parValue;
            localStorage.setItem('golf_current_pars', JSON.stringify(holePars));
            updateLog();
        }

        function updateParUI() {
            document.querySelectorAll('#par-grid button').forEach(b => b.classList.remove('orange-selected'));
            let savedPar = holePars[currentHole];
            if(savedPar) {
                document.querySelectorAll('#par-grid button').forEach(b => {
                    if(b.textContent.includes(savedPar)) b.classList.add('orange-selected');
                });
            }
        }

        function selectClub(element, club) {
            document.querySelectorAll('#club-grid button').forEach(b => b.classList.remove('selected'));
            element.classList.add('selected');
            currentSelection.club = club;
        }

        function selectQuality(element, q) {
            document.querySelectorAll('#quality-grid button').forEach(b => b.classList.remove('selected'));
            element.classList.add('selected');
            currentSelection.quality = q;
        }

        function selectResult(element, res) {
            document.querySelectorAll('#result-grid button').forEach(b => b.classList.remove('blue-selected'));
            if(element && element.classList) element.classList.add('blue-selected');
            currentSelection.result = res;
        }

        function selectPuttDist(element, dist) {
            document.querySelectorAll('#puttdist-grid button').forEach(b => b.classList.remove('selected'));
            element.classList.add('selected');
            currentSelection.puttDist = dist;
        }

        function adjustPutts(val) {
            currentSelection.putts = Math.max(0, currentSelection.putts + val);
            document.getElementById('putt-count').textContent = currentSelection.putts;
        }

        function registerShotStart() {
            if (!holePars[currentHole]) { alert('Välj hålets par först!'); return; }
            if (!currentSelection.club || !currentSelection.quality) { alert('Välj både klubba och träffkvalitet!'); return; }

            navigator.geolocation.getCurrentPosition((position) => {
                const shotData = {
                    course: document.getElementById('course-name').value || 'Okänd bana',
                    hole: currentHole,
                    par: holePars[currentHole],
                    shotNum: shots.filter(s => s.hole === currentHole).length + 1,
                    club: currentSelection.club,
                    quality: currentSelection.quality,
                    startLat: position.coords.latitude,
                    startLon: position.coords.longitude,
                    startAcc: Math.round(position.coords.accuracy), // Spara start-felmarginal
                    endLat: null,
                    endLon: null,
                    endAcc: null,
                    calculatedDistance: 0,
                    result: null
                };

                shots.push(shotData);
                localStorage.setItem('golf_current_shots', JSON.stringify(shots));
                
                document.getElementById('shot-creation-section').classList.add('hidden');
                document.getElementById('shot-landing-section').classList.remove('hidden');
                updateLog();
            }, () => { alert('GPS-fel.'); }, { enableHighAccuracy: true, timeout: 5000 });
        }

        function registerShotLanding() {
            if (!currentSelection.result) { alert('Välj var bollen landade!'); return; }

            navigator.geolocation.getCurrentPosition((position) => {
                let holeShots = shots.filter(s => s.hole === currentHole);
                let currentShot = holeShots[holeShots.length - 1];
                
                currentShot.endLat = position.coords.latitude;
                currentShot.endLon = position.coords.longitude;
                currentShot.endAcc = Math.round(position.coords.accuracy); // Spara slut-felmarginal
                currentShot.result = currentSelection.result;
                currentShot.calculatedDistance = getDistance(currentShot.startLat, currentShot.startLon, currentShot.endLat, currentShot.endLon);
                
                localStorage.setItem('golf_current_shots', JSON.stringify(shots));
                
                document.getElementById('shot-landing-section').classList.add('hidden');
                document.getElementById('shot-creation-section').classList.remove('hidden');
                
                currentSelection.club = null; currentSelection.quality = null; currentSelection.result = null;
                document.querySelectorAll('button').forEach(b => b.classList.remove('selected', 'blue-selected'));
                updateLog();
            }, () => { alert('GPS-fel.'); }, { enableHighAccuracy: true, timeout: 5000 });
        }

        function switchToPuttMode() {
            if (!holePars[currentHole]) { alert('Välj hålets par först!'); return; }
            document.getElementById('shot-creation-section').classList.add('hidden');
            document.getElementById('shot-landing-section').classList.add('hidden');
            document.getElementById('putt-section').classList.remove('hidden');
        }

        function endHole() {
            let holeShots = shots.filter(s => s.hole === currentHole);
            navigator.geolocation.getCurrentPosition((position) => {
                if (holeShots.length > 0) {
                    let lastShot = holeShots[holeShots.length - 1];
                    if (!lastShot.endLat) {
                        lastShot.endLat = position.coords.latitude;
                        lastShot.endLon = position.coords.longitude;
                        lastShot.endAcc = Math.round(position.coords.accuracy);
                        lastShot.result = 'Green';
                        lastShot.calculatedDistance = getDistance(lastShot.startLat, lastShot.startLon, lastShot.endLat, lastShot.endLon);
                    }
                    lastShot.putts = currentSelection.putts;
                    lastShot.puttDist = currentSelection.puttDist || 'Ej angivet';
                }
                
                localStorage.setItem('golf_current_shots', JSON.stringify(shots));
                changeHole(1);
                
                document.getElementById('shot-creation-section').classList.remove('hidden');
                document.getElementById('putt-section').classList.add('hidden');
                
                currentSelection = { club: null, quality: null, result: null, putts: 2, puttDist: null };
                document.getElementById('putt-count').textContent = 2;
                document.querySelectorAll('button').forEach(b => b.classList.remove('selected', 'blue-selected'));
                updateLog();
            }, () => { alert('GPS-fel.'); }, { enableHighAccuracy: true, timeout: 5000 });
        }

        function undoLastShot() {
            if (shots.length === 0) { alert("Det finns inga slag att ångra."); return; }
            if (confirm("Vill du ta bort det allra senaste registrerade slaget?")) {
                shots.pop();
                localStorage.setItem('golf_current_shots', JSON.stringify(shots));
                document.getElementById('shot-creation-section').classList.remove('hidden');
                document.getElementById('shot-landing-section').classList.add('hidden');
                document.getElementById('putt-section').classList.add('hidden');
                currentSelection = { club: null, quality: null, result: null, putts: 2, puttDist: null };
                document.querySelectorAll('button').forEach(b => b.classList.remove('selected', 'blue-selected'));
                updateLog();
            }
        }

        function updateLog() {
            const logDiv = document.getElementById('log');
            let parText = holePars[currentHole] ? `(Par ${holePars[currentHole]})` : '(Par ej valt)';
            
            let holeShots = shots.filter(s => s.hole === currentHole);
            let firText = "FIR: -";
            let girText = "GIR: -";
            
            if (holePars[currentHole]) {
                let p = holePars[currentHole];
                let firstShot = holeShots.find(s => s.shotNum === 1);
                if (firstShot && p > 3) {
                    firText = firstShot.result === 'Fairway' ? 'FIR: ✅' : 'FIR: ❌';
                }
                
                let onGreenShot = holeShots.find(s => s.result === 'Green');
                if (onGreenShot) {
                    let maxShotsForGir = p - 2;
                    girText = onGreenShot.shotNum <= maxShotsForGir ? 'GIR: ✅' : 'GIR: ❌';
                } else if (holeShots.some(s => s.putts !== undefined)) {
                    let totalStrokesBeforePutting = holeShots.length; 
                    let maxShotsForGir = p - 2;
                    girText = totalStrokesBeforePutting <= maxShotsForGir ? 'GIR: ✅' : 'GIR: ❌';
                }
            }

            if (shots.length === 0) { 
                logDiv.innerHTML = `<strong>Hål ${currentHole} ${parText}</strong>\n${firText} | ${girText}\n\nInga slag sparade på hålet än.`; 
                return; 
            }
            
            let html = `<strong>Hål ${currentHole} ${parText}</strong>\n${firText} | ${girText}\n\n`;
            if(holeShots.length === 0) { html += "Inga slag sparade på detta hål än."; logDiv.innerHTML = html; return;}
            
            holeShots.forEach(s => {
                html += `#${s.shotNum}: ${s.club} (${s.quality})`;
                // Återinförd felmarginal i skärmloggen (± m)
                if(s.calculatedDistance > 0) html += ` -> ${s.calculatedDistance}m (±${(s.startAcc || 0) + (s.endAcc || 0)}m)`;
                if(s.result) html += ` [Landa: ${s.result}]`;
                if(s.putts !== undefined) html += ` (${s.putts} puttar)`;
                html += `\n`;
            });
            logDiv.innerHTML = html;
        }

        function archiveCurrentRound() {
            if (shots.length === 0) { alert("Det finns inga slag att spara."); return; }
            let course = document.getElementById('course-name').value || 'Okänd bana';
            if (confirm(`Vill du arkivera rundan på "${course}"?`)) {
                let newRound = { id: Date.now(), date: new Date().toISOString().slice(0,10), course: course, data: shots, pars: holePars };
                archivedRounds.push(newRound);
                localStorage.setItem('golf_archived_rounds', JSON.stringify(archivedRounds));
                shots = []; holePars = {};
                localStorage.removeItem('golf_current_shots');
                localStorage.removeItem('golf_current_pars');
                currentHole = 1;
                document.getElementById('hole-number').textContent = currentHole;
                document.getElementById('course-name').value = "";
                localStorage.removeItem('golf_course_name');
                document.getElementById('shot-creation-section').classList.remove('hidden');
                document.getElementById('shot-landing-section').classList.add('hidden');
                document.getElementById('putt-section').classList.add('hidden');
                updateParUI(); updateLog(); updateHistoryList();
            }
        }

        function clearCurrentShots() {
            if(confirm("Vill du Rensa och Radera hela den pågående rundan? (Detta rör INTE din sparade historik)")) {
                shots = []; holePars = {};
                localStorage.removeItem('golf_current_shots');
                localStorage.removeItem('golf_current_pars');
                currentHole = 1;
                document.getElementById('hole-number').textContent = currentHole;
                updateParUI(); updateLog();
            }
        }

        function updateHistoryList() {
            const histDiv = document.getElementById('history-list');
            if (archivedRounds.length === 0) { histDiv.textContent = "Inga sparade rundor än."; return; }
            histDiv.innerHTML = "";
            [...archivedRounds].reverse().forEach(round => {
                let item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `<div><strong>${round.date}</strong><br><span style="color:#aaa;">${round.course}</span></div><div><button style="background:#4caf50; border:none; color:white; margin-right:5px;" onclick="exportSingleRound(${round.id})">📥 CSV</button><button style="background:#f44336; border:none; color:white;" onclick="deleteRound(${round.id})">🗑️</button></div>`;
                histDiv.appendChild(item);
            });
        }

        function exportSingleRound(roundId) {
            let round = archivedRounds.find(r => r.id === roundId);
            if(!round) return;
            
            // Återinförda kolumner för felmarginaler i CSV-exporten
            let csv = "Bana,Datum,Hal,Hal_Par,SlagNummer,Klubba,Traff,Langd(m),StartGPS_Felmarginal(m),SlutGPS_Felmarginal(m),TotalMaxAvvikelse(m),Landningslage,FIR,GIR,AntalPuttar,PuttDistans\n";
            
            round.data.forEach(s => {
                let p = s.par || 4;
                let fir = "N/A";
                let gir = "NEJ";
                
                if (p > 3 && s.shotNum === 1) {
                    fir = s.result === 'Fairway' ? "JA" : "NEJ";
                }
                
                let allShotsThisHole = round.data.filter(x => x.hole === s.hole);
                let greenShot = allShotsThisHole.find(x => x.result === 'Green');
                let maxGirShots = p - 2;
                
                if (greenShot && greenShot.shotNum <= maxGirShots) {
                    gir = "JA";
                } else if (!greenShot && allShotsThisHole.some(x => x.putts !== undefined)) {
                    let totalBeforePutt = allShotsThisHole.length;
                    if(totalBeforePutt <= maxGirShots) gir = "JA";
                }
                
                let totalError = (s.startAcc || 0) + (s.endAcc || 0);
                
                csv += `"${round.course}",${round.date},${s.hole},${p},${s.shotNum},${s.club},${s.quality},${s.calculatedDistance},${s.startAcc || 0},${s.endAcc || 0},${totalError},${s.result || ''},${fir},${gir},${s.putts || ''},${s.puttDist || ''}\n`;
            });
            
            let blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `golf_${round.course.replace(/\s+/g, '_')}_${round.date}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function deleteRound(roundId) {
            if(confirm("Ta bort från telefonen permanent?")) {
                archivedRounds = archivedRounds.filter(r => r.id !== roundId);
                localStorage.setItem('golf_archived_rounds', JSON.stringify(archivedRounds));
                updateHistoryList();
            }
        }

        updateParUI();
        updateLog();
        updateHistoryList();
    </script>
</body>
</html>
